<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Offer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    body, html {
      width: 100%;
      height: 100%;
      background-color: black; /* fills empty space */
    }

    .offer {
      width: 100%;
      height: 100%;
      background-image: url('offer.png');
      background-size: contain;   /* show full image */
      background-position: center;
      background-repeat: no-repeat;
    }
  </style>
</head>
<body>
  <div class="offer"></div>
</body>
</html>
